<!DOCTYPE html>
<html>
<head>
  <img src="golden-devco-logo.png" alt="Golden Devco Logo" style="width: 180px; margin-bottom: 20px;">
  <title>Golden Devco</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <section style="
  height:100vh;
  background:url('/images/hero.png') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
">

  <!-- Dark overlay for contrast -->
  <div style="
    position:absolute;
    inset:0;
    background:linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.9));
  "></div>

  <!-- Content -->
  <div style="
    position:relative;
    text-align:center;
    padding:40px;
    max-width:800px;
  ">
    <h1 style="
      font-size:clamp(40px,6vw,80px);
      margin:0;
      color:#fff;
      letter-spacing:2px;
      font-weight:900;
    ">
      Golden Devco
    </h1>

    <p style="
      font-size:20px;
      color:#d4af37;
      margin-top:15px;
      letter-spacing:1px;
    ">
      We build the systems that power modern businesses.
    </p>

    <div style="margin-top:30px;">
      <a href="#contact" style="
        display:inline-block;
        padding:16px 36px;
        background:#d4af37;
        color:#000;
        font-weight:700;
        border-radius:999px;
        text-decoration:none;
        font-size:16px;
      ">
        Start a Project
      </a>
    </div>

  </div>

</section>


</head>
<body>
  <div class="wrap">
    <h1>Golden Devco</h1>
    <p>We build systems that actually work.</p>
    <!-- live -->
  </div>
</body>
</html>
